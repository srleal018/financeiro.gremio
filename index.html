<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Financeiro Grêmio</title>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "financeiro-gremio-estudantil.firebaseapp.com",
  databaseURL: "https://financeiro-gremio-estudantil-default-rtdb.firebaseio.com",
  projectId: "financeiro-gremio-estudantil",
  storageBucket: "financeiro-gremio-estudantil.firebasestorage.app",
  messagingSenderId: "812766352627",
  appId: "1:812766352627:web:db80ec6b4f70f71b6cd386"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getDatabase();

let userGlobal = null;

// LOGIN
window.login = async () => {
  const provider = new GoogleAuthProvider();
  const result = await signInWithPopup(auth, provider);
  userGlobal = result.user;
};

// LOGOUT
window.logout = () => signOut(auth);

// VERIFICA LOGIN
onAuthStateChanged(auth, (user) => {
  if (user) {
    userGlobal = user;
    document.getElementById("loginPage").style.display = "none";
    document.getElementById("app").style.display = "block";
    document.getElementById("userName").innerText = user.displayName;

    carregarDados();
  } else {
    document.getElementById("loginPage").style.display = "flex";
    document.getElementById("app").style.display = "none";
  }
});

// SALVAR TRANSAÇÃO
window.salvar = () => {
  const valor = parseFloat(document.getElementById("valor").value);
  const tipo = document.getElementById("tipo").value;

  if (!valor) return alert("Digite um valor!");

  push(ref(db, "transacoes"), {
    valor,
    tipo,
    data: new Date().toLocaleString(),
    user: userGlobal.displayName
  });

  document.getElementById("valor").value = "";
};

// CARREGAR DADOS
function carregarDados() {
  const lista = document.getElementById("lista");

  onValue(ref(db, "transacoes"), (snapshot) => {
    lista.innerHTML = "";
    let saldo = 0;

    snapshot.forEach(child => {
      const d = child.val();

      const item = document.createElement("div");
      item.className = "item";

      item.innerHTML = `
        <span>${d.data}</span>
        <span>${d.user}</span>
        <span class="${d.tipo}">
          ${d.tipo === "deposito" ? "+" : "-"} R$ ${d.valor}
        </span>
      `;

      lista.prepend(item);

      saldo += d.tipo === "deposito" ? d.valor : -d.valor;
    });

    document.getElementById("saldo").innerText = saldo.toFixed(2);
  });
}
</script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

/* LOGIN */
#loginPage {
  display: flex;
  height: 100vh;
  justify-content: center;
  align-items: center;
}

.login-box {
  background: #1e293b;
  padding: 30px;
  border-radius: 10px;
  text-align: center;
}

button {
  padding: 10px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

/* APP */
#app {
  display: none;
}

header {
  background: #020617;
  padding: 15px;
  display: flex;
  justify-content: space-between;
}

main {
  padding: 20px;
}

.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 10px;
  margin-bottom: 20px;
}

.item {
  display: flex;
  justify-content: space-between;
  background: #020617;
  padding: 10px;
  margin: 5px 0;
  border-radius: 6px;
}

.deposito { color: #22c55e; }
.retirada { color: #ef4444; }
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
  <div class="login-box">
    <h2>🔐 Acesso ao Financeiro</h2>
    <p>Grêmio Estudantil</p>
    <button onclick="login()">Entrar com Google</button>
  </div>
</div>

<!-- APP -->
<div id="app">

<header>
  <span>💼 Painel Financeiro</span>
  <div>
    <span id="userName"></span>
    <button onclick="logout()">Sair</button>
  </div>
</header>

<main>

<div class="card">
  <h3>💰 Saldo Atual</h3>
  <h1>R$ <span id="saldo">0</span></h1>
</div>

<div class="card">
  <h3>➕ Nova Transação</h3>
  <input type="number" id="valor" placeholder="Valor">
  <select id="tipo">
    <option value="deposito">Depósito</option>
    <option value="retirada">Retirada</option>
  </select>
  <button onclick="salvar()">Salvar</button>
</div>

<div class="card">
  <h3>📋 Histórico</h3>
  <div id="lista"></div>
</div>

</main>

</div>

</body>
</html>
