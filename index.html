<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financeiro - Grêmio Geração Consciente</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Animações personalizadas */
        .fade-in { animation: fadeIn 0.5s ease-in-out; }
        .slide-up { animation: slideUp 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Ocultar elementos */
        .hidden-app { display: none !important; }
    </style>
</head>
<body class="bg-slate-100 font-sans text-slate-800 h-screen flex flex-col">

    <div id="login-screen" class="flex-1 flex items-center justify-center fade-in">
        <div class="bg-white p-10 rounded-2xl shadow-xl text-center max-w-md w-full border-t-4 border-green-600">
            <div class="bg-green-100 text-green-700 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6">
                <i class="fa-solid fa-vault text-4xl"></i>
            </div>
            <h1 class="text-2xl font-bold mb-2">Grêmio Geração Consciente</h1>
            <p class="text-slate-500 mb-8">Sistema de Gestão Financeira</p>
            
            <button id="btn-login-microsoft" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition-all duration-300 flex items-center justify-center gap-3 shadow-md hover:shadow-blue-500/50 mb-4">
                <i class="fa-brands fa-microsoft text-xl"></i>
                Entrar com Microsoft
            </button>

            <button id="btn-login-google" class="w-full bg-white hover:bg-slate-50 text-slate-700 font-bold py-3 px-4 border border-slate-300 rounded-lg transition-all duration-300 flex items-center justify-center gap-3 shadow-sm hover:shadow-md">
                <i class="fa-brands fa-google text-red-500 text-xl"></i>
                Entrar com Google
            </button>
        </div>
    </div>

    <div id="app-screen" class="hidden-app flex-1 flex flex-col fade-in h-screen overflow-hidden">
        <header class="bg-green-700 text-white p-4 shadow-md flex justify-between items-center z-10">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-chart-pie text-2xl"></i>
                <h1 class="font-bold text-xl tracking-wide">Portal Financeiro</h1>
            </div>
            <div class="flex items-center gap-4">
                <div class="text-right hidden sm:block">
                    <p id="user-name" class="font-semibold text-sm">A carregar...</p>
                    <p id="user-email" class="text-green-200 text-xs">...</p>
                </div>
                <button id="btn-logout" class="bg-red-500 hover:bg-red-600 px-4 py-2 rounded-lg text-sm font-bold transition">Sair</button>
            </div>
        </header>

        <div class="flex flex-1 overflow-hidden">
            <nav class="w-20 md:w-64 bg-slate-800 text-white flex flex-col shadow-xl z-10 transition-all duration-300">
                <button onclick="showTab('contagem')" class="tab-btn active p-4 md:p-6 text-left hover:bg-slate-700 border-l-4 border-transparent hover:border-green-500 transition-all flex items-center gap-4">
                    <i class="fa-solid fa-money-bill-wave text-xl"></i> <span class="hidden md:inline">Contagem</span>
                </button>
                <button onclick="showTab('operacoes')" class="tab-btn p-4 md:p-6 text-left hover:bg-slate-700 border-l-4 border-transparent hover:border-green-500 transition-all flex items-center gap-4">
                    <i class="fa-solid fa-right-left text-xl"></i> <span class="hidden md:inline">Operações</span>
                </button>
                <button onclick="showTab('logs')" class="tab-btn p-4 md:p-6 text-left hover:bg-slate-700 border-l-4 border-transparent hover:border-green-500 transition-all flex items-center gap-4">
                    <i class="fa-solid fa-clock-rotate-left text-xl"></i> <span class="hidden md:inline">Histórico (Logs)</span>
                </button>
            </nav>

            <main class="flex-1 p-6 overflow-y-auto bg-slate-50">
                
                <div id="tab-contagem" class="tab-content slide-up">
                    <h2 class="text-2xl font-bold mb-6 text-slate-700 border-b pb-2">Calculadora de Caixa</h2>
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                        
                        <div class="bg-white p-6 rounded-xl shadow-md border-t-4 border-green-500">
                            <h3 class="font-bold text-lg mb-4 text-green-700">Quantidade de Notas/Moedas</h3>
                            <div class="grid grid-cols-2 gap-4" id="money-inputs">
                                </div>
                        </div>

                        <div class="bg-white p-6 rounded-xl shadow-md border-t-4 border-blue-500 h-fit sticky top-6">
                            <h3 class="font-bold text-lg mb-4 text-blue-700">Total Calculado</h3>
                            <div class="text-5xl font-black text-slate-800 mb-6" id="total-display">€ 0,00</div>
                            <button onclick="transferToOperation()" class="w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-3 px-4 rounded-lg transition shadow-lg">
                                <i class="fa-solid fa-arrow-right-arrow-left mr-2"></i> Usar valor em Operação
                            </button>
                            <button onclick="clearCounter()" class="w-full mt-3 bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold py-2 px-4 rounded-lg transition">
                                Limpar
                            </button>
                        </div>
                    </div>
                </div>

                <div id="tab-operacoes" class="tab-content hidden-app slide-up">
                    <h2 class="text-2xl font-bold mb-6 text-slate-700 border-b pb-2">Registar Operação</h2>
                    <div class="bg-white max-w-xl p-8 rounded-xl shadow-md border-t-4 border-purple-500">
                        <form id="form-operacao" class="space-y-5">
                            <div>
                                <label class="block text-sm font-semibold text-slate-600 mb-1">Tipo de Operação</label>
                                <div class="grid grid-cols-2 gap-4">
                                    <label class="cursor-pointer">
                                        <input type="radio" name="tipoOp" value="entrada" class="peer sr-only" checked>
                                        <div class="p-3 text-center rounded-lg border-2 border-slate-200 peer-checked:border-green-500 peer-checked:bg-green-50 peer-checked:text-green-700 font-bold transition">
                                            <i class="fa-solid fa-arrow-down mr-2"></i> Entrada / Depósito
                                        </div>
                                    </label>
                                    <label class="cursor-pointer">
                                        <input type="radio" name="tipoOp" value="saida" class="peer sr-only">
                                        <div class="p-3 text-center rounded-lg border-2 border-slate-200 peer-checked:border-red-500 peer-checked:bg-red-50 peer-checked:text-red-700 font-bold transition">
                                            <i class="fa-solid fa-arrow-up mr-2"></i> Saída / Retirada
                                        </div>
                                    </label>
                                </div>
                            </div>
                            
                            <div>
                                <label class="block text-sm font-semibold text-slate-600 mb-1">Valor</label>
                                <input type="number" id="op-valor" step="0.01" min="0.01" required class="w-full p-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-purple-500 outline-none transition text-lg font-bold">
                            </div>

                            <div>
                                <label class="block text-sm font-semibold text-slate-600 mb-1">Descrição / Motivo</label>
                                <input type="text" id="op-desc" required placeholder="Ex: Venda de lanches, Compra de cartolinas..." class="w-full p-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-purple-500 outline-none transition">
                            </div>

                            <button type="submit" id="btn-submit-op" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-4 rounded-lg shadow-lg hover:shadow-purple-500/50 transition-all flex justify-center items-center gap-2">
                                <i class="fa-solid fa-check-circle"></i> Confirmar Registo
                            </button>
                        </form>
                    </div>
                </div>

                <div id="tab-logs" class="tab-content hidden-app slide-up">
                    <h2 class="text-2xl font-bold mb-6 text-slate-700 border-b pb-2">Histórico de Movimentações</h2>
                    <div class="bg-white rounded-xl shadow-md overflow-hidden border-t-4 border-slate-800">
                        <div class="overflow-x-auto">
                            <table class="w-full text-left border-collapse">
                                <thead>
                                    <tr class="bg-slate-100 text-slate-600 uppercase text-xs font-bold tracking-wider">
                                        <th class="p-4 border-b">Data/Hora</th>
                                        <th class="p-4 border-b">Tipo</th>
                                        <th class="p-4 border-b">Valor</th>
                                        <th class="p-4 border-b">Descrição</th>
                                        <th class="p-4 border-b">Responsável</th>
                                    </tr>
                                </thead>
                                <tbody id="logs-table-body" class="text-sm divide-y divide-slate-200">
                                    <tr><td colspan="5" class="p-8 text-center text-slate-500">A carregar registos...</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

            </main>
        </div>
    </div>

    <script type="module">
        // Importação atualizada com o GoogleAuthProvider
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, OAuthProvider, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDKZVyOq8zBNirp8cnpoO-lGfSoFqiW7XE",
            authDomain: "financeiro-gremio-estudantil.firebaseapp.com",
            projectId: "financeiro-gremio-estudantil",
            storageBucket: "financeiro-gremio-estudantil.firebasestorage.app",
            messagingSenderId: "812766352627",
            appId: "1:812766352627:web:db80ec6b4f70f71b6cd386",
            measurementId: "G-38TDJMH3GG"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        // Fornecedores de Autenticação
        const providerMicrosoft = new OAuthProvider('microsoft.com');
        const providerGoogle = new GoogleAuthProvider();

        // Referências do DOM
        const loginScreen = document.getElementById('login-screen');
        const appScreen = document.getElementById('app-screen');
        const userNameEl = document.getElementById('user-name');
        const userEmailEl = document.getElementById('user-email');
        let currentUser = null;

        // --- SISTEMA DE LOGIN ---
        
        // Login com Microsoft
        document.getElementById('btn-login-microsoft').addEventListener('click', () => {
            signInWithPopup(auth, providerMicrosoft).catch(err => {
                console.error("Erro no login com Microsoft:", err);
                alert("Erro ao iniciar sessão. Verifique se a Microsoft está ativada no Firebase Auth.");
            });
        });

        // Login com Google
        document.getElementById('btn-login-google').addEventListener('click', () => {
            signInWithPopup(auth, providerGoogle).catch(err => {
                console.error("Erro no login com Google:", err);
                alert("Erro ao iniciar sessão. Verifique se o Google está ativado na consola do Firebase Auth.");
            });
        });

        // Terminar Sessão
        document.getElementById('btn-logout').addEventListener('click', () => signOut(auth));

        // Observador de estado de autenticação
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                userNameEl.textContent = user.displayName || "Utilizador";
                userEmailEl.textContent = user.email;
                loginScreen.classList.add('hidden-app');
                appScreen.classList.remove('hidden-app');
                loadLogs(); // Carrega os dados do Firestore
            } else {
                currentUser = null;
                loginScreen.classList.remove('hidden-app');
                appScreen.classList.add('hidden-app');
            }
        });

        // --- CALCULADORA DE NOTAS/MOEDAS ---
        const moneyValues = [200, 100, 50, 20, 10, 5, 2, 1, 0.50, 0.25, 0.10, 0.05];
        const inputsContainer = document.getElementById('money-inputs');
        const totalDisplay = document.getElementById('total-display');
        let currentTotal = 0;

        // Alterado para a moeda Euro ou Reais conforme a preferência (mantive a formatação local para PT)
        moneyValues.forEach(val => {
            const isNote = val >= 2;
            const id = `money-${val}`;
            const formatVal = val.toLocaleString('pt-PT', { style: 'currency', currency: 'EUR' }); 
            // Se preferir manter Reais, mude para: currency: 'BRL'
            
            inputsContainer.innerHTML += `
                <div class="flex items-center justify-between bg-slate-50 p-2 border border-slate-200 rounded-lg">
                    <span class="font-semibold text-slate-700 w-24">${isNote ? '💵' : '🪙'} ${formatVal}</span>
                    <input type="number" id="${id}" min="0" placeholder="0" class="money-calc w-16 p-1 text-center border rounded bg-white outline-none focus:ring-2 focus:ring-green-400" data-val="${val}">
                </div>
            `;
        });

        inputsContainer.addEventListener('input', (e) => {
            if(e.target.classList.contains('money-calc')) {
                let sum = 0;
                document.querySelectorAll('.money-calc').forEach(input => {
                    const qtt = parseInt(input.value) || 0;
                    const val = parseFloat(input.getAttribute('data-val'));
                    sum += qtt * val;
                });
                currentTotal = sum;
                totalDisplay.textContent = sum.toLocaleString('pt-PT', { style: 'currency', currency: 'EUR' });
            }
        });

        window.clearCounter = () => {
            document.querySelectorAll('.money-calc').forEach(i => i.value = '');
            currentTotal = 0;
            totalDisplay.textContent = '€ 0,00';
        };

        window.transferToOperation = () => {
            if(currentTotal > 0) {
                document.getElementById('op-valor').value = currentTotal.toFixed(2);
                window.showTab('operacoes');
            } else {
                alert("Conte o dinheiro primeiro!");
            }
        };

        // --- SISTEMA DE LOGS E OPERAÇÕES (FIRESTORE) ---
        document.getElementById('form-operacao').addEventListener('submit', async (e) => {
            e.preventDefault();
            if(!currentUser) return;

            const tipo = document.querySelector('input[name="tipoOp"]:checked').value;
            const valor = parseFloat(document.getElementById('op-valor').value);
            const desc = document.getElementById('op-desc').value;
            const btn = document.getElementById('btn-submit-op');

            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> A guardar...';

            try {
                await addDoc(collection(db, "operacoes"), {
                    tipo: tipo,
                    valor: valor,
                    descricao: desc,
                    responsavelNome: currentUser.displayName,
                    responsavelEmail: currentUser.email,
                    data: serverTimestamp()
                });
                
                document.getElementById('form-operacao').reset();
                alert("Operação registada com sucesso!");
                window.showTab('logs');
            } catch (error) {
                console.error("Erro ao guardar:", error);
                alert("Erro ao registar operação.");
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-check-circle"></i> Confirmar Registo';
            }
        });

        function loadLogs() {
            const q = query(collection(db, "operacoes"), orderBy("data", "desc"));
            onSnapshot(q, (snapshot) => {
                const tbody = document.getElementById('logs-table-body');
                tbody.innerHTML = '';
                
                if(snapshot.empty) {
                    tbody.innerHTML = '<tr><td colspan="5" class="p-4 text-center text-slate-500">Nenhuma operação registada.</td></tr>';
                    return;
                }

                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const dataStr = data.data ? data.data.toDate().toLocaleString('pt-PT') : 'Agora';
                    const isEntrada = data.tipo === 'entrada';
                    const corValor = isEntrada ? 'text-green-600' : 'text-red-600';
                    const iconTipo = isEntrada ? '<i class="fa-solid fa-arrow-down text-green-500"></i> Depósito' : '<i class="fa-solid fa-arrow-up text-red-500"></i> Retirada';
                    
                    const tr = document.createElement('tr');
                    tr.className = "hover:bg-slate-50 transition";
                    tr.innerHTML = `
                        <td class="p-4 text-slate-500 whitespace-nowrap">${dataStr}</td>
                        <td class="p-4 font-semibold">${iconTipo}</td>
                        <td class="p-4 font-bold ${corValor}">${data.valor.toLocaleString('pt-PT', { style: 'currency', currency: 'EUR' })}</td>
                        <td class="p-4 text-slate-700">${data.descricao}</td>
                        <td class="p-4">
                            <div class="font-semibold text-slate-800">${data.responsavelNome || 'Utilizador'}</div>
                            <div class="text-xs text-slate-400">${data.responsavelEmail}</div>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            });
        }
    </script>

    <script>
        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden-app'));
            document.getElementById('tab-' + tabId).classList.remove('hidden-app');
            
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('border-green-500', 'bg-slate-700');
                btn.classList.add('border-transparent');
            });
            event.currentTarget.classList.remove('border-transparent');
            event.currentTarget.classList.add('border-green-500', 'bg-slate-700');
        }
    </script>
</body>
</html>
