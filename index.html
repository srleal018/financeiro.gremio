<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financeiro Geração Consciente | Pro</title>
    
    <script src="https://www.google.com/recaptcha/enterprise.js?render=6LddRI8sAAAAAN7zqwwjgiP0_0yOfFEEtkIXhpRZ"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .emerald-glow { box-shadow: 0 0 20px rgba(16, 185, 129, 0.2); }
        .tab-active { background: #10b981 !important; color: white !important; transform: scale(1.05); }
        .hidden-app { display: none !important; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-in { animation: slideIn 0.4s ease-out forwards; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <div id="login-screen" class="flex-1 flex items-center justify-center p-6 bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-slate-900 via-slate-950 to-black">
        <div class="glass p-10 rounded-[2rem] text-center max-w-sm w-full animate-in shadow-2xl">
            <div class="w-20 h-20 bg-emerald-500 rounded-3xl flex items-center justify-center mx-auto mb-6 rotate-6 shadow-lg shadow-emerald-500/30">
                <i class="fa-solid fa-building-columns text-4xl text-white"></i>
            </div>
            <h1 class="text-3xl font-extrabold mb-2 tracking-tight">Grêmio Geração</h1>
            <p class="text-slate-400 mb-8">Gestão Financeira Escolar</p>
            
            <button id="btn-login-google" class="w-full bg-white hover:bg-slate-100 text-slate-900 font-bold py-4 rounded-2xl transition-all flex items-center justify-center gap-3 active:scale-95 shadow-xl">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/pwa/google.svg" width="20">
                Entrar com Google
            </button>
            <p class="mt-6 text-[10px] text-slate-500 uppercase tracking-widest font-bold">Protegido por reCAPTCHA Enterprise</p>
        </div>
    </div>

    <div id="app-screen" class="hidden-app flex-1 flex flex-col h-screen overflow-hidden">
        <header class="h-20 glass border-b border-white/5 flex justify-between items-center px-8 z-50">
            <div class="flex items-center gap-4">
                <div class="p-2 bg-emerald-500/20 text-emerald-500 rounded-xl">
                    <i class="fa-solid fa-chart-line text-xl"></i>
                </div>
                <h2 class="font-bold text-lg hidden md:block">Sistema Financeiro</h2>
            </div>

            <div class="flex items-center gap-6">
                <div class="text-right border-r border-white/10 pr-6">
                    <p id="user-name" class="font-bold text-sm text-white">---</p>
                    <p id="user-email" class="text-slate-500 text-[10px] uppercase font-bold tracking-tighter">---</p>
                </div>
                <button id="btn-logout" class="hover:text-red-400 transition-colors">
                    <i class="fa-solid fa-power-off text-xl"></i>
                </button>
            </div>
        </header>

        <div class="flex flex-1 overflow-hidden">
            <nav class="w-20 md:w-64 glass border-r border-white/5 p-4 flex flex-col gap-4">
                <button onclick="showTab('contagem')" id="btn-tab-contagem" class="tab-btn tab-active p-4 rounded-2xl flex items-center gap-4 transition-all group">
                    <i class="fa-solid fa-coins text-xl"></i> <span class="hidden md:inline font-bold text-sm">Contagem</span>
                </button>
                <button onclick="showTab('operacoes')" id="btn-tab-operacoes" class="tab-btn p-4 rounded-2xl flex items-center gap-4 transition-all text-slate-400 hover:bg-white/5 group">
                    <i class="fa-solid fa-money-bill-transfer text-xl"></i> <span class="hidden md:inline font-bold text-sm">Operação</span>
                </button>
                <button onclick="showTab('logs')" id="btn-tab-logs" class="tab-btn p-4 rounded-2xl flex items-center gap-4 transition-all text-slate-400 hover:bg-white/5 group">
                    <i class="fa-solid fa-clock-rotate-left text-xl"></i> <span class="hidden md:inline font-bold text-sm">Histórico</span>
                </button>
            </nav>

            <main class="flex-1 overflow-y-auto p-6 md:p-10">
                
                <div id="tab-contagem" class="tab-content animate-in">
                    <div class="flex flex-col md:flex-row justify-between items-end mb-10 gap-4">
                        <div>
                            <span class="text-emerald-500 font-bold text-xs uppercase tracking-widest">Caixa Físico</span>
                            <h3 class="text-4xl font-extrabold text-white">Calculadora</h3>
                        </div>
                        <div class="bg-emerald-500/10 p-6 rounded-3xl border border-emerald-500/20 text-right min-w-[250px]">
                            <p class="text-[10px] font-black text-emerald-500 uppercase">Soma Total</p>
                            <div id="total-display" class="text-4xl font-black text-white">R$ 0,00</div>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 xl:grid-cols-3 gap-8">
                        <div class="xl:col-span-2 grid grid-cols-1 md:grid-cols-2 gap-4" id="money-inputs">
                            </div>
                        <div class="space-y-4">
                            <div class="glass p-8 rounded-[2.5rem] sticky top-0 border-t-4 border-emerald-500">
                                <h4 class="font-bold mb-6 flex items-center gap-2"><i class="fa-solid fa-bolt text-yellow-400"></i> Atalhos</h4>
                                <button onclick="transferToOperation()" class="w-full bg-emerald-500 hover:bg-emerald-400 text-white font-black py-5 rounded-2xl shadow-lg transition-all mb-4 uppercase text-xs tracking-widest">
                                    Enviar para Registro
                                </button>
                                <button onclick="clearCounter()" class="w-full bg-white/5 hover:bg-white/10 text-slate-300 font-bold py-4 rounded-2xl transition">
                                    Limpar Tudo
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="tab-operacoes" class="tab-content hidden-app animate-in">
                    <h3 class="text-3xl font-extrabold mb-8">Nova Movimentação</h3>
                    <div class="max-w-xl glass p-8 rounded-[2.5rem] border-l-4 border-emerald-500">
                        <form id="form-operacao" class="space-y-6">
                            <div class="flex gap-4 p-2 bg-black/20 rounded-2xl">
                                <label class="flex-1 cursor-pointer group">
                                    <input type="radio" name="tipoOp" value="entrada" class="peer sr-only" checked>
                                    <div class="p-4 rounded-xl text-center font-bold peer-checked:bg-emerald-500 peer-checked:text-white text-slate-500 transition-all uppercase text-xs">Depósito</div>
                                </label>
                                <label class="flex-1 cursor-pointer group">
                                    <input type="radio" name="tipoOp" value="saida" class="peer sr-only">
                                    <div class="p-4 rounded-xl text-center font-bold peer-checked:bg-red-500 peer-checked:text-white text-slate-500 transition-all uppercase text-xs">Retirada</div>
                                </label>
                            </div>

                            <div class="space-y-2">
                                <label class="text-[10px] font-black text-slate-500 uppercase ml-2">Valor em Reais</label>
                                <div class="relative">
                                    <div class="absolute left-5 top-1/2 -translate-y-1/2 font-bold text-emerald-500">R$</div>
                                    <input type="number" id="op-valor" step="0.01" required class="w-full bg-white/5 border border-white/10 p-5 pl-12 rounded-2xl outline-none focus:border-emerald-500 text-2xl font-black">
                                </div>
                            </div>

                            <div class="space-y-2">
                                <label class="text-[10px] font-black text-slate-500 uppercase ml-2">Motivo / Descrição</label>
                                <textarea id="op-desc" required rows="3" class="w-full bg-white/5 border border-white/10 p-5 rounded-2xl outline-none focus:border-emerald-500" placeholder="Descreva a origem ou destino..."></textarea>
                            </div>

                            <button type="submit" id="btn-submit-op" class="w-full bg-emerald-500 hover:bg-emerald-400 text-white font-black py-5 rounded-2xl shadow-xl transition-all uppercase text-xs tracking-widest">
                                Confirmar Lançamento
                            </button>
                        </form>
                    </div>
                </div>

                <div id="tab-logs" class="tab-content hidden-app animate-in">
                    <div class="flex justify-between items-center mb-10">
                        <h3 class="text-3xl font-extrabold">Fluxo de Caixa</h3>
                        <div class="bg-white/5 px-6 py-3 rounded-2xl border border-white/10">
                            <span class="text-[10px] font-black text-slate-500 uppercase">Saldo Final: </span>
                            <span id="balance-total" class="font-black text-emerald-500">R$ 0,00</span>
                        </div>
                    </div>
                    
                    <div class="glass rounded-[2rem] overflow-hidden border border-white/5 shadow-2xl">
                        <table class="w-full text-left">
                            <thead class="bg-white/5 text-[10px] font-black uppercase text-slate-400 tracking-widest">
                                <tr>
                                    <th class="p-6">Data</th>
                                    <th class="p-6">Operação</th>
                                    <th class="p-6">Valor</th>
                                    <th class="p-6">Responsável</th>
                                </tr>
                            </thead>
                            <tbody id="logs-table-body" class="text-sm divide-y divide-white/5">
                                </tbody>
                        </table>
                    </div>
                </div>

            </main>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDKZVyOq8zBNirp8cnpoO-lGfSoFqiW7XE",
            authDomain: "financeiro-gremio-estudantil.firebaseapp.com",
            projectId: "financeiro-gremio-estudantil",
            storageBucket: "financeiro-gremio-estudantil.firebasestorage.app",
            messagingSenderId: "812766352627",
            appId: "1:812766352627:web:db80ec6b4f70f71b6cd386"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        // FUNÇÃO RECAPTCHA
        async function getRecaptchaToken(action) {
            return new Promise((resolve) => {
                grecaptcha.enterprise.ready(async () => {
                    const token = await grecaptcha.enterprise.execute('6LddRI8sAAAAAN7zqwwjgiP0_0yOfFEEtkIXhpRZ', {action: action});
                    resolve(token);
                });
            });
        }

        // LOGIN
        document.getElementById('btn-login-google').addEventListener('click', async () => {
            const token = await getRecaptchaToken('login');
            if(token) signInWithPopup(auth, provider);
        });

        document.getElementById('btn-logout').addEventListener('click', () => signOut(auth));

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('user-name').textContent = user.displayName;
                document.getElementById('user-email').textContent = user.email;
                document.getElementById('login-screen').classList.add('hidden-app');
                document.getElementById('app-screen').classList.remove('hidden-app');
                loadData();
            } else {
                document.getElementById('login-screen').classList.remove('hidden-app');
                document.getElementById('app-screen').classList.add('hidden-app');
            }
        });

        // CALCULADORA
        const denominations = [200, 100, 50, 20, 10, 5, 2, 1, 0.5, 0.25, 0.1, 0.05];
        const container = document.getElementById('money-inputs');

        denominations.forEach(val => {
            container.innerHTML += `
                <div class="glass p-5 rounded-2xl flex items-center justify-between group hover:border-emerald-500/50 transition-all">
                    <span class="font-bold text-slate-400">${val.toLocaleString('pt-BR', {style: 'currency', currency:'BRL'})}</span>
                    <div class="flex items-center gap-3">
                        <button onclick="changeVal('in-${val}', -1)" class="w-8 h-8 rounded-lg bg-white/5 hover:bg-red-500/20 text-slate-500 hover:text-red-500 transition-all">-</button>
                        <input type="number" id="in-${val}" data-val="${val}" class="money-input w-12 bg-transparent text-center font-black text-white outline-none" placeholder="0">
                        <button onclick="changeVal('in-${val}', 1)" class="w-8 h-8 rounded-lg bg-white/5 hover:bg-emerald-500/20 text-slate-500 hover:text-emerald-500 transition-all">+</button>
                    </div>
                </div>`;
        });

        window.changeVal = (id, step) => {
            const el = document.getElementById(id);
            el.value = Math.max(0, (parseInt(el.value) || 0) + step);
            calcTotal();
        };

        container.addEventListener('input', calcTotal);

        function calcTotal() {
            let t = 0;
            document.querySelectorAll('.money-input').forEach(i => t += (parseFloat(i.value)||0) * parseFloat(i.dataset.val));
            window.lastCalc = t;
            document.getElementById('total-display').textContent = t.toLocaleString('pt-BR', {style: 'currency', currency:'BRL'});
        }

        window.clearCounter = () => {
            document.querySelectorAll('.money-input').forEach(i => i.value = '');
            calcTotal();
        };

        window.transferToOperation = () => {
            if(window.lastCalc > 0) {
                document.getElementById('op-valor').value = window.lastCalc.toFixed(2);
                showTab('operacoes');
            }
        };

        // FIRESTORE
        document.getElementById('form-operacao').addEventListener('submit', async (e) => {
            e.preventDefault();
            const token = await getRecaptchaToken('submit_operation');
            if(!token) return;

            const btn = document.getElementById('btn-submit-op');
            btn.disabled = true;
            btn.textContent = "PROCESSANDO...";

            try {
                await addDoc(collection(db, "operacoes"), {
                    tipo: document.querySelector('input[name="tipoOp"]:checked').value,
                    valor: parseFloat(document.getElementById('op-valor').value),
                    descricao: document.getElementById('op-desc').value,
                    responsavelNome: auth.currentUser.displayName,
                    responsavelEmail: auth.currentUser.email,
                    data: serverTimestamp()
                });
                document.getElementById('form-operacao').reset();
                showTab('logs');
            } catch (e) { alert("Erro ao salvar dados!"); }
            finally { 
                btn.disabled = false; 
                btn.textContent = "CONFIRMAR LANÇAMENTO";
            }
        });

        function loadData() {
            const q = query(collection(db, "operacoes"), orderBy("data", "desc"));
            onSnapshot(q, (snap) => {
                const tbody = document.getElementById('logs-table-body');
                let saldo = 0;
                tbody.innerHTML = '';
                snap.forEach(doc => {
                    const d = doc.data();
                    const isEntrada = d.tipo === 'entrada';
                    saldo += isEntrada ? d.valor : -d.valor;
                    tbody.innerHTML += `
                        <tr class="hover:bg-white/5 transition-colors">
                            <td class="p-6 text-slate-500 font-medium">${d.data ? d.data.toDate().toLocaleDateString('pt-BR') : '...'}</td>
                            <td class="p-6">
                                <span class="px-3 py-1 rounded-lg text-[10px] font-black ${isEntrada ? 'bg-emerald-500/10 text-emerald-500' : 'bg-red-500/10 text-red-500'}">
                                    ${isEntrada ? 'DEPÓSITO' : 'RETIRADA'}
                                </span>
                            </td>
                            <td class="p-6">
                                <div class="font-black ${isEntrada ? 'text-emerald-400' : 'text-red-400'}">${isEntrada?'+':'-'} ${d.valor.toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}</div>
                                <div class="text-xs text-slate-500">${d.descricao}</div>
                            </td>
                            <td class="p-6">
                                <div class="text-white font-bold">${d.responsavelNome}</div>
                                <div class="text-[9px] text-slate-500 uppercase">${d.responsavelEmail}</div>
                            </td>
                        </tr>`;
                });
                document.getElementById('balance-total').textContent = saldo.toLocaleString('pt-BR', {style: 'currency', currency:'BRL'});
            });
        }
    </script>

    <script>
        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden-app'));
            document.getElementById('tab-' + id).classList.remove('hidden-app');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('tab-active', 'text-white'));
            const btn = document.getElementById('btn-tab-' + id);
            btn.classList.add('tab-active');
        }
    </script>
</body>
</html>
